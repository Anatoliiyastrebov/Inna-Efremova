<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64" role="img" aria-label="Инна — Wellness">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85b89a"/>
      <stop offset="100%" stop-color="#4d7c6a"/>
    </linearGradient>
  </defs>

  <!-- Icon: minimalist leaf/sprout -->
  <g transform="translate(4, 6)">
    <!-- Left leaf -->
    <path d="M26 26 C18 20 10 10 16 4 C22 8 26 18 26 26 Z" fill="url(#leafGrad)" opacity="0.85"/>
    <!-- Right leaf -->
    <path d="M26 26 C34 20 42 10 36 4 C30 8 26 18 26 26 Z" fill="url(#leafGrad)"/>
    <!-- Stem -->
    <line x1="26" y1="26" x2="26" y2="48" stroke="#4d7c6a" stroke-width="2" stroke-linecap="round"/>
    <!-- Small roots -->
    <path d="M26 48 C22 44 16 44 14 46" stroke="#85b89a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M26 48 C30 44 36 44 38 46" stroke="#85b89a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Text: ИННА -->
  <text x="62" y="30" font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif" font-size="22" font-weight="700" fill="#3a5a48" letter-spacing="3">ИННА</text>
  <!-- Divider -->
  <rect x="62" y="36" width="148" height="1" fill="#85b89a" opacity="0.4"/>
  <!-- Text: wellness -->
  <text x="63" y="52" font-family="'Trebuchet MS', 'Gill Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#85b89a" letter-spacing="4">WELLNESS</text>
</svg>
